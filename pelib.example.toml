[paths]
# Local path to your LLM Wiki vault. This file is a template; copy it to
# pelib.toml and edit it for your machine.
wiki_root = "~/Documents/LLM-WIKI Vault"
llm_wiki_skill_repo = "./llm-wiki-skill"

[skill]
name = "personal-execution-library"

[sync]
default_adapters = ["claude_code", "codex_cli", "copilot-chat"]
